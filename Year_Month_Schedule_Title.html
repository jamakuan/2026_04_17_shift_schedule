<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>排班表標題產生器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f4f6;
      --panel: #ffffff;
      --line: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --accent: #1d4ed8;
      --accent-soft: #dbeafe;
      --weekend: #333333;
      --holiday: #f59e0b;
      --duty: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px 20px 48px;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
    }

    .control-grid,
    .summary-grid {
      display: grid;
      gap: 16px;
    }

    .control-grid {
      grid-template-columns: 180px 180px 1fr;
      align-items: end;
    }

    .summary-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 16px;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #ffffff;
      min-height: 92px;
    }

    .summary-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .summary-value {
      line-height: 1.7;
      font-weight: bold;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      font: inherit;
    }

    .toggle-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      padding-bottom: 2px;
    }

    .toggle-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      color: var(--text);
    }

    .toggle-item input {
      width: auto;
      margin: 0;
    }

    .note-bar {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 6px;
      background: #f9fafb;
      color: var(--muted);
      line-height: 1.6;
    }

    .table-wrapper {
      margin-top: 16px;
      overflow-x: hidden;
      display: none;
    }

    .table-scale-stage {
      width: 100%;
      overflow: hidden;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      transform-origin: left top;
    }

    td {
      border: 1px solid #999;
      text-align: center;
      padding: 10px 4px;
      font-size: 16px;
      font-weight: bold;
      background: #ffffff;
      vertical-align: middle;
      min-width: 36px;
      height: 28px;
    }

    .left-date-title {
      min-width: 142px;
      background: #ffffff;
      font-size: 16px;
    }

    .employee-id-header,
    .employee-id {
      min-width: 52px;
      width: 52px;
    }

    .employee-name-header,
    .employee-name {
      min-width: 90px;
      width: 90px;
    }

    .employee-id,
    .employee-name {
      font-weight: normal;
    }

    .holiday-footer,
    .schedule-rules-footer {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 6px;
      line-height: 1.7;
      display: none;
    }

    .holiday-footer {
      border-left: 4px solid var(--holiday);
      background: #fff7ed;
      font-size: 14px;
      font-weight: bold;
    }

    .schedule-rules-footer {
      border-left: 4px solid #666666;
      background: #f8f8f8;
      font-size: 14px;
    }

    td.weekend {
      background: var(--weekend);
      color: #ffffff;
    }

    td.national-holiday {
      background: var(--holiday);
      color: #111111;
    }

    td.duty-day {
      background: var(--duty);
      color: #ffffff;
    }

    @media (max-width: 1100px) {
      .control-grid,
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="panel">
      <h1>排班表標題產生器</h1>
      <p>先建立年度假日值班分配邏輯，將每月假日上班天數轉成 4 人值班天數與下月順序。</p>
    </section>

    <section class="panel">
      <div class="control-grid">
        <div>
          <label for="yearInput">年份</label>
          <input id="yearInput" type="number" min="2026" placeholder="例如：2026" />
        </div>
        <div>
          <label for="monthInput">月份</label>
          <input id="monthInput" type="number" min="1" max="12" placeholder="例如：5" />
        </div>
        <div>
          <label>顯示選項</label>
          <div class="toggle-group">
            <label class="toggle-item" for="holidayToggle">
              <input id="holidayToggle" type="checkbox" checked />
              顯示國定假日橘色標記
            </label>
            <label class="toggle-item" for="originalHolidayToggle">
              <input id="originalHolidayToggle" type="checkbox" checked />
              顯示原始假日與休假標記
            </label>
          </div>
        </div>
      </div>

      <div class="note-bar">
        首月固定順序：鍾靜怡 → 許芷嘉 → 黃柏瑜 → 彭盛寬。週日全員休假，王宏榮假日固定休息，不參與假日值班分配。週六與週一到週五的國定假日都需安排 1 人上班。
      </div>

      <div class="summary-grid">
        <div class="summary-card">
          <span class="summary-label">本月假日上班天數</span>
          <div id="summaryDutyDayCount" class="summary-value">-</div>
        </div>
        <div class="summary-card">
          <span class="summary-label">本月排班順序</span>
          <div id="summaryCurrentOrder" class="summary-value">-</div>
        </div>
        <div class="summary-card">
          <span class="summary-label">本月假日上班次數</span>
          <div id="summaryDutyCounts" class="summary-value">-</div>
        </div>
        <div class="summary-card">
          <span class="summary-label">下個月順序</span>
          <div id="summaryNextOrder" class="summary-value">-</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2 style="margin: 0 0 16px; font-size: 22px;">年度摘要</h2>
      <div style="overflow-x: auto;">
        <table style="width: 100%; min-width: 900px;">
          <thead>
            <tr>
              <th>月份</th>
              <th>假日上班天數</th>
              <th>本月順序</th>
              <th>值班天數</th>
              <th>下月順序</th>
            </tr>
          </thead>
          <tbody id="summaryTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <h2 id="scheduleTitle" style="margin: 0 0 16px; font-size: 22px;">單月月曆</h2>
      <div id="tableWrapper" class="table-wrapper">
        <div id="tableScaleStage" class="table-scale-stage">
          <table id="scheduleTable">
            <tbody id="scheduleTableBody"></tbody>
          </table>
        </div>
      </div>
      <div id="holidayFooter" class="holiday-footer"></div>
      <div id="scheduleRulesFooter" class="schedule-rules-footer"></div>
    </section>
  </div>

  <script>
    const yearInput = document.getElementById("yearInput");
    const monthInput = document.getElementById("monthInput");
    const holidayToggle = document.getElementById("holidayToggle");
    const originalHolidayToggle = document.getElementById("originalHolidayToggle");
    const summaryDutyDayCount = document.getElementById("summaryDutyDayCount");
    const summaryCurrentOrder = document.getElementById("summaryCurrentOrder");
    const summaryDutyCounts = document.getElementById("summaryDutyCounts");
    const summaryNextOrder = document.getElementById("summaryNextOrder");
    const summaryTableBody = document.getElementById("summaryTableBody");
    const scheduleTitle = document.getElementById("scheduleTitle");
    const tableWrapper = document.getElementById("tableWrapper");
    const tableScaleStage = document.getElementById("tableScaleStage");
    const scheduleTable = document.getElementById("scheduleTable");
    const scheduleTableBody = document.getElementById("scheduleTableBody");
    const holidayFooter = document.getElementById("holidayFooter");
    const scheduleRulesFooter = document.getElementById("scheduleRulesFooter");

    const weekdayNames = ["日", "一", "二", "三", "四", "五", "六"];
    const employees = [
      { id: "2191", name: "王宏榮", holidayFixedOff: true },
      { id: "2196", name: "鍾靜怡", holidayFixedOff: false },
      { id: "2138", name: "許芷嘉", holidayFixedOff: false },
      { id: "2318", name: "黃柏瑜", holidayFixedOff: false },
      { id: "2442", name: "彭盛寬", holidayFixedOff: false }
    ];
    const dutyEmployeeNames = ["鍾靜怡", "許芷嘉", "黃柏瑜", "彭盛寬"];
    const initialDutyOrder = [...dutyEmployeeNames];

    const nationalHolidays = {
      "2026-01-01": "開國紀念日",
      "2026-02-15": "小年夜",
      "2026-02-16": "農曆除夕",
      "2026-02-17": "春節",
      "2026-02-18": "春節",
      "2026-02-19": "春節",
      "2026-02-20": "補假",
      "2026-02-27": "補假",
      "2026-02-28": "和平紀念日",
      "2026-04-03": "補假",
      "2026-04-04": "兒童節",
      "2026-04-05": "清明節",
      "2026-04-06": "補假",
      "2026-05-01": "勞動節",
      "2026-06-19": "端午節",
      "2026-09-25": "中秋節",
      "2026-09-28": "孔子誕辰紀念日 / 教師節",
      "2026-10-09": "補假",
      "2026-10-10": "國慶日",
      "2026-10-25": "臺灣光復暨金門古寧頭大捷紀念日",
      "2026-10-26": "補假",
      "2026-12-25": "行憲紀念日"
    };

    const state = {
      currentYear: null,
      yearData: []
    };

    function formatDateKey(year, month, day) {
      return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function getWeekday(year, month, day) {
      return new Date(year, month - 1, day).getDay();
    }

    function isSunday(year, month, day) {
      return getWeekday(year, month, day) === 0;
    }

    function isSaturday(year, month, day) {
      return getWeekday(year, month, day) === 6;
    }

    function isNationalHoliday(year, month, day) {
      return Object.prototype.hasOwnProperty.call(nationalHolidays, formatDateKey(year, month, day));
    }

    function getHolidayName(year, month, day) {
      return nationalHolidays[formatDateKey(year, month, day)] || "";
    }

    function getCellType(year, month, day) {
      if (holidayToggle.checked && isNationalHoliday(year, month, day)) {
        return "nationalHoliday";
      }

      if (isSaturday(year, month, day) || isSunday(year, month, day)) {
        return "weekend";
      }

      return "normal";
    }

    function isDutyHoliday(year, month, day) {
      if (isSunday(year, month, day)) {
        return false;
      }

      if (isSaturday(year, month, day)) {
        return true;
      }

      return isNationalHoliday(year, month, day);
    }

    function getDutyDates(year, month) {
      const dutyDates = [];
      const totalDays = getDaysInMonth(year, month);
      for (let day = 1; day <= totalDays; day += 1) {
        if (isDutyHoliday(year, month, day)) {
          dutyDates.push(day);
        }
      }
      return dutyDates;
    }

    function createDutyCounts(order, dutyDayCount) {
      const base = Math.floor(dutyDayCount / order.length);
      const remainder = dutyDayCount % order.length;
      const dutyCounts = {};

      order.forEach((name, index) => {
        dutyCounts[name] = base + (index < remainder ? 1 : 0);
      });

      return dutyCounts;
    }

    function assignDutyDates(order, dutyCounts, dutyDates) {
      const assignmentByDay = {};
      let cursor = 0;

      order.forEach((name) => {
        for (let index = 0; index < dutyCounts[name]; index += 1) {
          const day = dutyDates[cursor];
          if (day !== undefined) {
            assignmentByDay[day] = name;
          }
          cursor += 1;
        }
      });

      return assignmentByDay;
    }

    function getNextOrder(order, dutyCounts) {
      return [...order].sort((nameA, nameB) => {
        if (dutyCounts[nameA] !== dutyCounts[nameB]) {
          return dutyCounts[nameA] - dutyCounts[nameB];
        }
        return order.indexOf(nameA) - order.indexOf(nameB);
      });
    }

    function generateYearData(year) {
      const records = [];
      let carryOrder = [...initialDutyOrder];

      for (let month = 1; month <= 12; month += 1) {
        const dutyDates = getDutyDates(year, month);
        const dutyCounts = createDutyCounts(carryOrder, dutyDates.length);
        const assignmentByDay = assignDutyDates(carryOrder, dutyCounts, dutyDates);
        const nextOrder = getNextOrder(carryOrder, dutyCounts);

        records.push({
          month,
          order: [...carryOrder],
          dutyDates,
          dutyCounts,
          assignmentByDay,
          nextOrder
        });

        carryOrder = nextOrder;
      }

      return records;
    }

    function getMonthRecord(month) {
      return state.yearData.find((record) => record.month === month) || null;
    }

    function createCell(text, classNames = [], title = "") {
      const cell = document.createElement("td");
      cell.textContent = text;
      classNames.forEach((name) => cell.classList.add(name));
      if (title) {
        cell.title = title;
      }
      return cell;
    }

    function createLeftDateTitleCell() {
      const cell = document.createElement("td");
      cell.classList.add("left-date-title");
      cell.colSpan = 2;
      cell.textContent = "日期";
      return cell;
    }

    function createEmployeeHeaderRow() {
      const row = document.createElement("tr");
      row.appendChild(createCell("員編", ["employee-id-header"]));
      row.appendChild(createCell("姓名/星期", ["employee-name-header"]));
      return row;
    }

    function getEmployeeCellDisplay(employee, record, day) {
      const classNames = ["schedule-input-cell"];
      const cellType = getCellType(state.currentYear, record.month, day);
      const assignedName = record.assignmentByDay[day] || "";
      let text = "";

      if (cellType === "nationalHoliday") {
        classNames.push("national-holiday");
      } else if (cellType === "weekend") {
        classNames.push("weekend");
      }

      if (assignedName === employee.name) {
        classNames.push("duty-day");
        text = "班";
      } else if (isSunday(state.currentYear, record.month, day)) {
        text = originalHolidayToggle.checked ? "例" : "";
      } else if (isSaturday(state.currentYear, record.month, day) || isNationalHoliday(state.currentYear, record.month, day)) {
        text = originalHolidayToggle.checked ? "休" : "";
      }

      return { text, classNames };
    }

    function createEmployeeRow(employee, record) {
      const row = document.createElement("tr");
      row.appendChild(createCell(employee.id, ["employee-id"]));
      row.appendChild(createCell(employee.name, ["employee-name"]));

      const daysInMonth = getDaysInMonth(state.currentYear, record.month);
      for (let day = 1; day <= daysInMonth; day += 1) {
        const meta = getEmployeeCellDisplay(employee, record, day);
        row.appendChild(createCell(meta.text, meta.classNames, getHolidayName(state.currentYear, record.month, day)));
      }

      return row;
    }

    function updateTableScale() {
      tableScaleStage.style.height = "";
      scheduleTable.style.transform = "scale(1)";

      const availableWidth = tableWrapper.clientWidth;
      const tableWidth = scheduleTable.offsetWidth;
      const tableHeight = scheduleTable.offsetHeight;
      if (availableWidth === 0 || tableWidth === 0 || tableHeight === 0) {
        return;
      }

      const scale = Math.min(1, availableWidth / tableWidth);
      scheduleTable.style.transform = `scale(${scale})`;
      tableScaleStage.style.height = `${Math.ceil(tableHeight * scale)}px`;
    }

    function renderSummary(record) {
      summaryDutyDayCount.textContent = `${record.dutyDates.length} 天`;
      summaryCurrentOrder.innerHTML = record.order.join(" → ");
      summaryDutyCounts.innerHTML = record.order.map((name) => `${name} ${record.dutyCounts[name]} 天`).join("<br>");
      summaryNextOrder.innerHTML = record.nextOrder.join(" → ");
    }

    function renderAnnualSummary() {
      summaryTableBody.innerHTML = "";
      state.yearData.forEach((record) => {
        const row = document.createElement("tr");
        row.appendChild(createCell(`${record.month} 月`));
        row.appendChild(createCell(`${record.dutyDates.length} 天`));
        row.appendChild(createCell(record.order.join(" → ")));
        row.appendChild(createCell(record.order.map((name) => `${name} ${record.dutyCounts[name]} 天`).join("、")));
        row.appendChild(createCell(record.nextOrder.join(" → ")));
        summaryTableBody.appendChild(row);
      });
    }

    function renderHolidayFooter(record) {
      const holidayNotes = [];
      const daysInMonth = getDaysInMonth(state.currentYear, record.month);
      for (let day = 1; day <= daysInMonth; day += 1) {
        if (holidayToggle.checked && isNationalHoliday(state.currentYear, record.month, day)) {
          holidayNotes.push(`${record.month}/${day} ${getHolidayName(state.currentYear, record.month, day)}`);
        }
      }

      if (holidayNotes.length > 0) {
        holidayFooter.style.display = "block";
        holidayFooter.textContent = `國定假日：${holidayNotes.join("、")}`;
      } else {
        holidayFooter.style.display = "none";
        holidayFooter.textContent = "";
      }
    }

    function renderRulesFooter(record) {
      scheduleRulesFooter.style.display = "block";
      scheduleRulesFooter.innerHTML = `
        <div><strong>本月排班順序：</strong>${record.order.join(" → ")}</div>
        <div><strong>本月假日上班次數：</strong>${record.order.map((name) => `${name} ${record.dutyCounts[name]} 天`).join("、")}</div>
        <div><strong>下個月順序：</strong>${record.nextOrder.join(" → ")}</div>
      `;
    }

    function renderMonthView() {
      const year = Number(yearInput.value);
      const month = Number(monthInput.value);
      const isValidYear = Number.isInteger(year) && year >= 2026;
      const isValidMonth = Number.isInteger(month) && month >= 1 && month <= 12;

      if (!isValidYear || !isValidMonth) {
        scheduleTitle.textContent = "單月月曆";
        summaryDutyDayCount.textContent = "-";
        summaryCurrentOrder.textContent = "-";
        summaryDutyCounts.textContent = "-";
        summaryNextOrder.textContent = "-";
        tableWrapper.style.display = "none";
        scheduleTableBody.innerHTML = "";
        holidayFooter.style.display = "none";
        scheduleRulesFooter.style.display = "none";
        return;
      }

      state.currentYear = year;
      state.yearData = generateYearData(year);
      renderAnnualSummary();
      const record = getMonthRecord(month);
      if (!record) {
        return;
      }

      renderSummary(record);
      scheduleTitle.textContent = `${year}年${month}月排班表`;
      tableWrapper.style.display = "block";

      const daysInMonth = getDaysInMonth(year, month);
      const dateRow = document.createElement("tr");
      const weekdayRow = createEmployeeHeaderRow();
      dateRow.appendChild(createLeftDateTitleCell());

      for (let day = 1; day <= daysInMonth; day += 1) {
        const cellType = getCellType(year, month, day);
        const classNames = [];
        const holidayName = getHolidayName(year, month, day);
        if (cellType === "nationalHoliday") {
          classNames.push("national-holiday");
        } else if (cellType === "weekend") {
          classNames.push("weekend");
        }

        dateRow.appendChild(createCell(String(day), classNames, holidayName));
        weekdayRow.appendChild(createCell(weekdayNames[getWeekday(year, month, day)], classNames, holidayName));
      }

      scheduleTableBody.innerHTML = "";
      scheduleTableBody.appendChild(dateRow);
      scheduleTableBody.appendChild(weekdayRow);
      employees.forEach((employee) => {
        scheduleTableBody.appendChild(createEmployeeRow(employee, record));
      });

      renderHolidayFooter(record);
      renderRulesFooter(record);
      updateTableScale();
    }

    yearInput.addEventListener("input", renderMonthView);
    monthInput.addEventListener("input", renderMonthView);
    holidayToggle.addEventListener("change", renderMonthView);
    originalHolidayToggle.addEventListener("change", renderMonthView);
    window.addEventListener("resize", updateTableScale);

    yearInput.value = "2026";
    monthInput.value = "5";
    renderMonthView();
  </script>
</body>
</html>
