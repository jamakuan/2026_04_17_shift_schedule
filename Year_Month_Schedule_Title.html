<!DOCTYPE html>
<html lang="zh-Hant">
		<head>
		  <meta charset="UTF-8" />
		    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
		      <title>排班表標題產生器</title>
		        <style>
    * {
	          box-sizing: border-box;
	          }

    body {
	          font-family: Arial, "Microsoft JhengHei", sans-serif;
		        margin: 0;
		        padding: clamp(12px, 1.8vw, 24px);
			      background: #f5f5f5;
			          }

        .container {
		      max-width: 1800px;
		            margin: 0 auto;
				          background: #ffffff;
				        padding: clamp(12px, 1.5vw, 20px);
						      border-radius: 8px;
						            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
							        }

	    label {
		          display: block;
			        margin-top: 16px;
				      font-weight: bold;
				          }

	        input {
			      width: 100%;
			            padding: 10px;
				          margin-top: 6px;
					        box-sizing: border-box;
						      font-size: 16px;
						          }

		    .toggle-row {
			          margin-top: 18px;
				        display: flex;
					      align-items: center;
					            gap: 10px;
							      font-weight: bold;
						          }

	        .toggle-row input {
				      width: auto;
				            margin: 0;
					        }

	    .toggle-row label {
		          margin-top: 0;
			        font-weight: bold;
				      display: inline-flex;
				      align-items: center;
				        }

	    .toggle-row .toggle-item {
		          display: inline-flex;
			        align-items: center;
				      gap: 6px;
				        }

	    .toggle-button {
		          border: 1px solid #3366cc;
			        border-radius: 999px;
				      background: #ffffff;
				            color: #3366cc;
					          font: inherit;
						        font-weight: bold;
							      padding: 8px 14px;
								    cursor: pointer;
								        }

	    .toggle-button.active {
		          background: #3366cc;
			        color: #ffffff;
				      }

			    #scheduleTitle {
				          margin-top: 28px;
					        padding: 16px;
						      background: #eef3ff;
						            border-left: 4px solid #3366cc;
							          font-size: 24px;
								        font-weight: bold;
									      display: none;
									          }

				        .table-wrapper {
						      margin-top: 16px;
						            overflow-x: auto;
							          display: none;
								      }

					    table {
						          width: 100%;
							        border-collapse: collapse;
								      table-layout: fixed;
								            min-width: 0;
									        }

					        td {
							      border: 1px solid #999;
							            text-align: center;
								          padding: 8px 2px;
									        font-size: 14px;
										      font-weight: bold;
										            background: #ffffff;
											          vertical-align: middle;
												        min-width: 0;
													      height: 28px;
													      line-height: 1.2;
													          }

						    .left-date-title {
							          width: 120px;
								        background: #ffffff;
									      font-size: 15px;
									          }

						        .employee-id-header,
						    .employee-id {
								          width: 48px;
										    }

							        .employee-name-header,
								    .employee-name {
									          width: 84px;
											    }

								        .employee-id,
									    .employee-name {
										          font-weight: normal;
											      }

									        .day-cell {
										          width: auto;
											      }

									        .schedule-input-cell {
											      background: #ffffff;
											          }

									    .holiday-footer {
										          margin-top: 12px;
											        padding: 10px 12px;
												      border-left: 4px solid #f59e0b;
												            background: #fff7ed;
													          font-size: 14px;
														        line-height: 1.6;
															      font-weight: bold;
															            display: none;
																        }

									        .schedule-rules-footer {
											      margin-top: 8px;
											            padding: 10px 12px;
												          border-left: 4px solid #666666;
													        background: #f8f8f8;
														      font-size: 14px;
														            line-height: 1.7;
															          display: none;
																      }

										    .schedule-rules-footer-title {
											          font-weight: bold;
												        margin-bottom: 2px;
													    }

										        .schedule-rules-footer ol {
												      margin: 0;
												            padding-left: 28px;
													        }

											    td.weekend {
												          background: #333333;
													        color: #ffffff;
														    }

												        td.national-holiday {
														      background: #f59e0b;
														            color: #111111;
															    }

    @media (max-width: 1366px) {
	          body {
		        padding: 10px;
		      }

		      .container {
			        padding: 12px;
			      }

			      td {
				        padding: 7px 1px;
					      font-size: 13px;
					    }

					    .left-date-title {
						      width: 108px;
						          }

					      .employee-id-header,
					      .employee-id {
						        width: 44px;
						            }

					        .employee-name-header,
					        .employee-name {
							      width: 76px;
							          }
	        }

/* 選班模式相關樣式 */
body.select-duty-mode-active .duty-selectable {
  cursor: pointer;
  transition: background-color 0.2s ease, box-shadow 0.2s ease;
}
body.select-duty-mode-active .duty-selectable:hover {
  background-color: #e0e7ff !important;
  box-shadow: inset 0 0 0 2px #3366cc;
}

/* 當該員工選班已滿額時，該員工未選的格子（目前顯示為休的格子）滑鼠顯示為禁止 */
body.select-duty-mode-active .duty-selectable.duty-limit-reached:not(.duty-selected-active) {
  cursor: not-allowed !important;
}
body.select-duty-mode-active .duty-selectable.duty-limit-reached:not(.duty-selected-active):hover {
  background-color: #f1f5f9 !important;
  box-shadow: inset 0 0 0 2px #ef4444;
}

.duty-stats-card {
  margin-top: 24px;
  background: #ffffff;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
  padding: 20px;
  max-width: 480px;
  margin-left: auto;
  display: none;
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 閃爍動畫 */
@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* 當未輪到該人員選班時，滑鼠顯示為禁止，且無 hover 背景變色 */
body.select-duty-mode-active .duty-selectable.duty-not-turn {
  cursor: not-allowed !important;
}
body.select-duty-mode-active .duty-selectable.duty-not-turn:hover {
  background-color: transparent !important;
  box-shadow: none !important;
}

.duty-stats-title {
  font-size: 16px;
  font-weight: 700;
  color: #1e293b;
  margin-bottom: 12px;
  border-bottom: 2px solid #e2e8f0;
  padding-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.duty-stats-summary {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 16px;
  background: #f8fafc;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #f1f5f9;
}

.duty-stats-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}

.duty-member-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.duty-member-info {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  font-weight: 600;
  color: #334155;
}

.duty-progress-bar {
  height: 8px;
  background: #e2e8f0;
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}

.duty-progress-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 0.3s ease, background-color 0.3s ease;
}

.duty-progress-fill.normal {
  background: linear-gradient(90deg, #3366cc, #6366f1);
}

.duty-progress-fill.completed {
  background: #10b981;
}

.duty-progress-fill.exceeded {
  background: #ef4444;
}

.duty-seq-flow {
  font-size: 14px;
  background: #f1f5f9;
  padding: 10px 12px;
  border-radius: 8px;
  color: #334155;
  margin-top: 12px;
}

.duty-seq-title {
  font-weight: 700;
  margin-bottom: 6px;
  font-size: 13px;
  color: #475569;
}

.duty-seq-badge-container {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.duty-seq-badge {
  background: #ffffff;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 12px;
  font-weight: 700;
  color: #334155;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.duty-seq-arrow {
  color: #94a3b8;
  font-size: 12px;
}

.top-layout {
  display: flex;
  gap: clamp(16px, 3vw, 40px);
  align-items: stretch;
  margin-top: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.control-panel {
  flex: 1;
  min-width: 320px;
}

.schedule-rules-footer.header-rules {
  flex: 1.2;
  min-width: 320px;
  margin-top: 0;
}

.duty-member-item {
  cursor: grab;
  transition: all 0.2s ease;
  user-select: none;
}

.duty-member-item:active {
  cursor: grabbing;
}

.duty-member-item.drag-over {
  border: 2px dashed #3366cc !important;
  background-color: #eff6ff !important;
  transform: scale(1.02);
}
							  </style>
	</head>
	<body>
		  <div class="container">
			      <h1>排班表標題產生器</h1>

			      <div class="top-layout">
			        <div class="control-panel">
			          <div class="input-row" style="display: flex; gap: 16px; align-items: flex-end;">
			            <div style="flex: 1; max-width: 140px;">
			              <label for="yearInput" style="margin-top: 0; font-weight: bold; display: block;">年份</label>
			              <input id="yearInput" type="number" placeholder="例如：2026" min="2026" style="margin-top: 6px;" />
			            </div>
			            <div style="flex: 1; max-width: 100px;">
			              <label for="monthInput" style="margin-top: 0; font-weight: bold; display: block;">月份</label>
			              <input id="monthInput" type="number" placeholder="例如：5" min="1" max="12" style="margin-top: 6px;" />
			            </div>
			          </div>

			          <div class="toggle-row">
			            <span class="toggle-item">
			              <input id="holidayToggle" type="checkbox" checked />
			              <label for="holidayToggle">顯示國定假日橘色標記</label>
			            </span>
			            <span class="toggle-item">
			              <input id="originalHolidayToggle" type="checkbox" checked />
			              <label for="originalHolidayToggle">原始假日</label>
			            </span>
			            <button id="selectDutyButton" class="toggle-button" type="button">選班</button>
			          </div>
			        </div>

			        <div id="scheduleRulesFooter" class="schedule-rules-footer header-rules">
			          <div class="schedule-rules-footer-title">排班方式：</div>
			          <ol>
			            <li>如有需要調整，請與其他排班人員協調，協調完畢再通知經理進行更新</li>
			            <li>平日上班限制1人，國定假日視情況而定</li>
			            <li>每兩週需排定2天例假，每四週例假+休息日至少8天，不得連續工作超過12日</li>
			            <li>假日值班（週六及國定假日）限制1人值班，後續順序人員不可重複選擇已有人值班的假日。</li>
			          </ol>
			        </div>
			      </div>

			      <div id="scheduleTitle"></div>

			      <div id="tableWrapper" class="table-wrapper">
			        <table>
			          <tbody id="scheduleTableBody"></tbody>
			        </table>
			        <div id="holidayFooter" class="holiday-footer"></div>
			        <div id="dutyStatsCard" class="duty-stats-card"></div>
																									          </div>
																										    </div>

																										      <script>
																												      const yearInput = document.getElementById("yearInput");
																												      const monthInput = document.getElementById("monthInput");
																												      const holidayToggle = document.getElementById("holidayToggle");
																												      const originalHolidayToggle = document.getElementById("originalHolidayToggle");
																												      const selectDutyButton = document.getElementById("selectDutyButton");
																												      const scheduleTitle = document.getElementById("scheduleTitle");
																												      const tableWrapper = document.getElementById("tableWrapper");
																												      const scheduleTableBody = document.getElementById("scheduleTableBody");
																												      const holidayFooter = document.getElementById("holidayFooter");
																												      const scheduleRulesFooter = document.getElementById("scheduleRulesFooter");
																												      let selectDutyModeEnabled = false;
																												      const userDutySelections = {};

																												      const weekdayNames = ["日", "一", "二", "三", "四", "五", "六"];

																												      const employees = [
																													            { id: "2191", name: "王宏榮" },
																													            { id: "2196", name: "鍾靜怡" },
																													            { id: "2138", name: "許芷嘉" },
																													            { id: "2318", name: "黃柏瑜" },
																													            { id: "2442", name: "彭盛寬" }
																													          ];

																												      // 目前年份從 2026 開始支援。
																												      // 台灣 2026 年政府行政機關辦公日曆表假日資料。
																												      // 2026 以前年份暫不支援。
																												      const nationalHolidays = {
																													            "2026-01-01": "開國紀念日",
																													            "2026-02-15": "小年夜",
																													            "2026-02-16": "農曆除夕",
																													            "2026-02-17": "春節",
																													            "2026-02-18": "春節",
																													            "2026-02-19": "春節",
																													            "2026-02-20": "補假",
																													            "2026-02-27": "補假",
																													            "2026-02-28": "和平紀念日",
																													            "2026-04-03": "補假",
																													            "2026-04-04": "兒童節",
																													            "2026-04-05": "清明節",
																													            "2026-04-06": "補假",
																													            "2026-05-01": "勞動節",
																													            "2026-06-19": "端午節",
																													            "2026-09-25": "中秋節",
																													            "2026-09-28": "孔子誕辰紀念日 / 教師節",
																													            "2026-10-09": "補假",
																													            "2026-10-10": "國慶日",
																													            "2026-10-25": "臺灣光復暨金門古寧頭大捷紀念日",
																													            "2026-10-26": "補假",
																													            "2026-12-25": "行憲紀念日"
																													          };

																												      function getDaysInMonth(year, month) {
																													            return new Date(year, month, 0).getDate();
																													          }

																												      function formatDateKey(year, month, day) {
																													            const monthText = String(month).padStart(2, "0");
																													            const dayText = String(day).padStart(2, "0");
																													            return `${year}-${monthText}-${dayText}`;
																													          }

																												      function isWeekend(year, month, day) {
																													            const weekday = new Date(year, month - 1, day).getDay();
																													            return weekday === 0 || weekday === 6;
																													          }

																												      function isNationalHoliday(year, month, day) {
																													            const dateKey = formatDateKey(year, month, day);
																													            return Object.prototype.hasOwnProperty.call(nationalHolidays, dateKey);
																													          }

																												      function getHolidayName(year, month, day) {
																													            const dateKey = formatDateKey(year, month, day);
																													            return nationalHolidays[dateKey] || "";
																													          }

																												      function getWeekdayName(year, month, day) {
																													            const weekday = new Date(year, month - 1, day).getDay();
																													            return weekdayNames[weekday];
																													          }

																													      function createCell(text, cellType, holidayName = "") {
																														            const cell = document.createElement("td");
																														            cell.classList.add("day-cell");
																														            cell.textContent = text;

																													            if (cellType === "nationalHoliday") {
																															            cell.classList.add("national-holiday");
																															            cell.title = holidayName;
																															          }

																													            if (cellType === "weekend") {
																															            cell.classList.add("weekend");
																															          }

																													            return cell;
																													          }

																												      function getEmployeeCellDisplay(employee, year, month, day) {
																													            const weekday = new Date(year, month - 1, day).getDay();
																													            const isSunday = weekday === 0;
																													            const isSaturday = weekday === 6;
																													            const isNational = isNationalHoliday(year, month, day);

																													            if (selectDutyModeEnabled) {
																															            if (isSunday) return "例";
																															            if (isSaturday || isNational) {
																																	              if (employee.name !== "王宏榮") {
																																			                const dateKey = formatDateKey(year, month, day);
																																			                const selKey = `${employee.id}-${dateKey}`;
																																			                return userDutySelections[selKey] ? "" : "休";
																																			              }
																																	              return "休";
																																	            }
																															            // 平日補休
																															            if (employee.name !== "王宏榮") {
																																	              const dateKey = formatDateKey(year, month, day);
																																	              const selKey = `${employee.id}-${dateKey}`;
																																	              return userDutySelections[selKey] ? "補" : "";
																																	            }
																															            return "";
																															          }

																													            if (!originalHolidayToggle.checked) {
																															            return "";
																															          }

																													            if (isSunday) {
																															            return "例";
																															          }

																													            if (isSaturday || isNationalHoliday(year, month, day)) {
																															            return "休";
																															          }

																													            return "";
																													          }

																												      function createLeftDateTitleCell() {
																													            const cell = document.createElement("td");
																													            cell.classList.add("left-date-title");
																													            cell.colSpan = 2;
																													            cell.textContent = "日期";
																													            return cell;
																													          }

																												      function createEmployeeHeaderRow() {
																													            const row = document.createElement("tr");

																													            const employeeIdHeader = document.createElement("td");
																													            employeeIdHeader.classList.add("employee-id-header");
																													            employeeIdHeader.textContent = "員編";

																													            const employeeNameHeader = document.createElement("td");
																													            employeeNameHeader.classList.add("employee-name-header");
																													            employeeNameHeader.textContent = "姓名/星期";

																													            row.appendChild(employeeIdHeader);
																													            row.appendChild(employeeNameHeader);

																													            return row;
																													          }

																												      function createEmployeeRow(employee, year, month, daysInMonth) {
																													            const row = document.createElement("tr");

																													            const employeeIdCell = document.createElement("td");
																													            employeeIdCell.classList.add("employee-id");
																													            employeeIdCell.textContent = employee.id;

																													            const employeeNameCell = document.createElement("td");
																													            employeeNameCell.classList.add("employee-name");
																													            employeeNameCell.textContent = employee.name;

																													            row.appendChild(employeeIdCell);
																													            row.appendChild(employeeNameCell);

																													            for (let day = 1; day <= daysInMonth; day++) {
																															            const cellType = getCellType(year, month, day);
																															            const holidayName = getHolidayName(year, month, day);
																																            const scheduleCell = document.createElement("td");
																																            scheduleCell.classList.add("schedule-input-cell", "day-cell");
																																            scheduleCell.textContent = getEmployeeCellDisplay(employee, year, month, day);

																															            if (cellType === "nationalHoliday") {
																																	              scheduleCell.classList.add("national-holiday");
																																	              scheduleCell.title = holidayName;
																																	            }

																															            if (cellType === "weekend") {
																																	              scheduleCell.classList.add("weekend");
																																	            }

																																	            const weekday = new Date(year, month - 1, day).getDay();
																																	            const isSaturday = weekday === 6;
																																	            const isNational = isNationalHoliday(year, month, day);
																																	            const isHoliday = (isSaturday || isNational);

																																	            // 只要不是王宏榮，且不是週日，這天就是可選填的
																																	            if (employee.name !== "王宏榮" && weekday !== 0) {
																																			              scheduleCell.classList.add("duty-selectable");
																																			              scheduleCell.setAttribute("data-employee-id", employee.id);
																																			              scheduleCell.setAttribute("data-day", day);
																																			              scheduleCell.addEventListener("click", () => {
																																					                if (!selectDutyModeEnabled) return;
																																					                
																																					                const { total } = getDutyDaysInMonth(year, month);
																																					                const base = Math.floor(total / 4);
																																					                const remainder = total % 4;
																																					                const assigned = {};
																																					                currentDutySeq.forEach((name, idx) => {
																																							                  assigned[name] = base + (idx < remainder ? 1 : 0);
																																							                });
																																					                
																																					                // 檢查是否輪到該人員。如果未輪到他，則拒絕點擊
																																					                const currentSelectorName = getCurrentSelectorName(year, month, assigned);
																																					                if (employee.name !== currentSelectorName) {
																																							                  return;
																																							                }
																																					                
																																					                const dateKey = formatDateKey(year, month, day);
																																					                const selKey = `${employee.id}-${dateKey}`;
																																					                const isSelected = !!userDutySelections[selKey];
																																					                
																																					                // 檢查上限限制
																																					                if (!isSelected && scheduleCell.classList.contains("duty-limit-reached")) {
																																							                  return;
																																							                }
																																					                
																																					                userDutySelections[selKey] = !userDutySelections[selKey];
																																					                if (isHoliday) {
																																							                  scheduleCell.textContent = userDutySelections[selKey] ? "" : "休";
																																							                } else {
																																									                  scheduleCell.textContent = userDutySelections[selKey] ? "補" : "";
																																									                }
																																					                
																																					                updateSelectableCellsState();
																																					                updateRightPanel();
																																					              });
																																			            }

																															            row.appendChild(scheduleCell);
																															          }

																													            return row;
																													          }

																												      function getCellType(year, month, day) {
																													            const shouldShowNationalHoliday = holidayToggle.checked;

																													            if (shouldShowNationalHoliday && isNationalHoliday(year, month, day)) {
																															            return "nationalHoliday";
																															          }

																													            if (isWeekend(year, month, day)) {
																															            return "weekend";
																															          }

																													            return "normal";
																													          }

																													      function updateScheduleTitle() {
																													            const year = Number(yearInput.value);
																													            const month = Number(monthInput.value);
																													            const isValidYear = Number.isInteger(year) && year >= 2026;
																													            const isValidMonth = Number.isInteger(month) && month >= 1 && month <= 12;

																													            if (!isValidYear || !isValidMonth) {
																															            scheduleTitle.textContent = "";
																															            scheduleTitle.style.display = "none";
																															            tableWrapper.style.display = "none";
																															            scheduleTableBody.innerHTML = "";
																															            holidayFooter.textContent = "";
																															            holidayFooter.style.display = "none";
																															            scheduleRulesFooter.style.display = "none";
																															            return;
																															          }

																													            const monthKey = `${year}-${String(month).padStart(2, "0")}`;
																													            if (dutySeqHistory[monthKey]) {
																																	              currentDutySeq = [...dutySeqHistory[monthKey]];
																																	            } else {
																																			              // 第一次造訪此月，無歷史紀錄，則使用預設順序
																																			              currentDutySeq = ["鍾靜怡", "許芷嘉", "黃柏瑜", "彭盛寬"];
																																			              dutySeqHistory[monthKey] = [...currentDutySeq];
																																			            }
																													            lastRenderedYear = year;
																													            lastRenderedMonth = month;

																													            scheduleTitle.textContent = `${year}年${month}月排班表`;
																													            scheduleTitle.style.display = "block";
																													            tableWrapper.style.display = "block";

																													            const daysInMonth = getDaysInMonth(year, month);
																													            const dateRow = document.createElement("tr");
																													            const weekdayRow = createEmployeeHeaderRow();
																													            const holidayNotes = [];

																													            dateRow.appendChild(createLeftDateTitleCell());

																													            for (let day = 1; day <= daysInMonth; day++) {
																															            const cellType = getCellType(year, month, day);
																															            const holidayName = getHolidayName(year, month, day);

																															            if (holidayToggle.checked && cellType === "nationalHoliday") {
																																	              holidayNotes.push(`${month}/${day} ${holidayName}`);
																																	            }

																															            dateRow.appendChild(createCell(day, cellType, holidayName));
																															            weekdayRow.appendChild(createCell(getWeekdayName(year, month, day), cellType, holidayName));
																															          }

																													            scheduleTableBody.innerHTML = "";

																													            scheduleTableBody.appendChild(dateRow);
																													            scheduleTableBody.appendChild(weekdayRow);

																													            employees.forEach((employee) => {
																															            scheduleTableBody.appendChild(createEmployeeRow(employee, year, month, daysInMonth));
																															          });

																														            if (holidayToggle.checked && holidayNotes.length > 0) {
																																            holidayFooter.textContent = `國定假日：${holidayNotes.join("、")}`;
																																            holidayFooter.style.display = "block";
																															          } else {
																																	          holidayFooter.textContent = "";
																																	          holidayFooter.style.display = "none";
																																	        }

																														            scheduleRulesFooter.style.display = "block";
																														            updateSelectableCellsState();
																														            updateRightPanel();
																														          }

																												      function getDutyDaysInMonth(year, month) {
																													            const daysInMonth = getDaysInMonth(year, month);
																													            let saturdayCount = 0;
																													            let nationalHolidayCount = 0;
																													            for (let day = 1; day <= daysInMonth; day++) {
																																		              const weekday = new Date(year, month - 1, day).getDay();
																																		              const isNational = isNationalHoliday(year, month, day);
																																		              if (isNational) {
																																				                nationalHolidayCount++;
																																				              } else if (weekday === 6) {
																																						                saturdayCount++;
																																						              }
																																		            }
																																            return {
																																		              total: saturdayCount + nationalHolidayCount,
																																		              saturdays: saturdayCount,
																																		              holidays: nationalHolidayCount
																																		            };
																																          }

																																          function getEmployeeSelections(empId, year, month) {
																																		            const daysInMonth = getDaysInMonth(year, month);
																																		            let dutyCount = 0;
																																		            let compCount = 0;
																																		            for (let day = 1; day <= daysInMonth; day++) {
																																				              const weekday = new Date(year, month - 1, day).getDay();
																																				              const isNational = isNationalHoliday(year, month, day);
																																				              const dateKey = formatDateKey(year, month, day);
																																				              const selKey = `${empId}-${dateKey}`;
																																				              if (userDutySelections[selKey]) {
																																						                if (weekday === 6 || isNational) {
																																								                  dutyCount++;
																																								                } else if (weekday !== 0) {
																																										                  compCount++;
																																										                }
																																						              }
																																				            }
																																		            return { duty: dutyCount, comp: compCount };
																																		          }

																																		          function getCurrentSelectorName(year, month, assigned) {
																																				            for (const name of currentDutySeq) {
																																						              const emp = employees.find(e => e.name === name);
																																						              if (!emp) continue;
																																						              const limit = assigned[name] || 0;
																																						              const { duty, comp } = getEmployeeSelections(emp.id, year, month);
																																						              if (duty !== limit || comp !== limit) {
																																								                return name;
																																								              }
																																						            }
																																				            return null;
																																				          }

																																          let currentDutySeq = ["鍾靜怡", "許芷嘉", "黃柏瑜", "彭盛寬"];
																																          let nextDutySeq = [];
																																          let lastRenderedYear = null;
																																          let lastRenderedMonth = null;
																																          const dutySeqHistory = {};

																																          function updateSelectableCellsState() {
																																		            const year = Number(yearInput.value);
																																		            const month = Number(monthInput.value);
																																		            const isValidYear = Number.isInteger(year) && year >= 2026;
																																		            const isValidMonth = Number.isInteger(month) && month >= 1 && month <= 12;
																																		            if (!isValidYear || !isValidMonth) return;

																																		            const { total } = getDutyDaysInMonth(year, month);
																																		            const base = Math.floor(total / 4);
																																		            const remainder = total % 4;

																																		            const assigned = {};
																																		            currentDutySeq.forEach((name, idx) => {
																																				              assigned[name] = base + (idx < remainder ? 1 : 0);
																																				            });

																																		            // 獲取當前輪到選班的人
																																		            const currentSelectorName = getCurrentSelectorName(year, month, assigned);

																																		            employees.forEach(emp => {
																																				              if (emp.name === "王宏榮") return;
																																				              const limit = assigned[emp.name] || 0;
																																				              const isCurrent = (emp.name === currentSelectorName);
																																				              const { duty, comp } = getEmployeeSelections(emp.id, year, month);

																																				              const cells = document.querySelectorAll(`td[data-employee-id="${emp.id}"]`);
																																				              cells.forEach(cell => {
																																						                const day = Number(cell.getAttribute("data-day"));
																																						                const weekday = new Date(year, month - 1, day).getDay();
																																						                const isNational = isNationalHoliday(year, month, day);
																																						                const isHoliday = (weekday === 6 || isNational);
																																						                
																																						                const dateKey = formatDateKey(year, month, day);
																																						                const selKey = `${emp.id}-${dateKey}`;
																																						                const isSelected = !!userDutySelections[selKey];

																																						                if (isSelected) {
																																								                  cell.classList.add("duty-selected-active");
																																								                } else {
																																										                  cell.classList.remove("duty-selected-active");
																																										                }

																																						                if (!isCurrent) {
																																								                  cell.classList.add("duty-not-turn");
																																								                  cell.classList.remove("duty-limit-reached");
																																								                } else {
																																										                  cell.classList.remove("duty-not-turn");
																																										                  
																																										                  // 檢查是否已被其他人選取值班 (僅限假日)
																							                  let isHolidayTakenByOther = false;
																							                  if (isHoliday) {
																							                    isHolidayTakenByOther = employees.some(otherEmp => {
																							                      if (otherEmp.name === "王宏榮" || otherEmp.id === emp.id) return false;
																							                      const otherSelKey = `${otherEmp.id}-${dateKey}`;
																							                      return !!userDutySelections[otherSelKey];
																							                    });
																							                  }
																							                  
																							                  const limitReached = isHoliday ? (duty >= limit || isHolidayTakenByOther) : (comp >= limit);
																																										                  if (limitReached && !isSelected) {
																																												                    cell.classList.add("duty-limit-reached");
																																												                  } else {
																																														                    cell.classList.remove("duty-limit-reached");
																																														                  }
																																										                }
																																						              });
																																				            });
																																		          }

																																          function updateRightPanel() {
																																		            const year = Number(yearInput.value);
																																		            const month = Number(monthInput.value);
																																		            const isValidYear = Number.isInteger(year) && year >= 2026;
																																		            const isValidMonth = Number.isInteger(month) && month >= 1 && month <= 12;
																																		            const card = document.getElementById("dutyStatsCard");
																																		            if (!card) return;
																																		            if (!isValidYear || !isValidMonth) {
																																				              card.style.display = "none";
																																				              return;
																																				            }
																																		            card.style.display = "block";

																																		            const { total, saturdays, holidays } = getDutyDaysInMonth(year, month);
																																		            const base = Math.floor(total / 4);
																																		            const remainder = total % 4;
																																		            const assigned = {};
																																		            currentDutySeq.forEach((name, idx) => {
																																				              assigned[name] = base + (idx < remainder ? 1 : 0);
																																				            });

																																		            if (remainder === 0) {
																																				              nextDutySeq = [currentDutySeq[1], currentDutySeq[2], currentDutySeq[3], currentDutySeq[0]];
																																				            } else {
																																				              nextDutySeq = [...currentDutySeq].sort((p1, p2) => {
																																						                if (assigned[p1] !== assigned[p2]) {
																																								                  return assigned[p1] - assigned[p2];
																																								                }
																																						                return currentDutySeq.indexOf(p1) - currentDutySeq.indexOf(p2);
																																						              });
																																				            }

																																				            // 即時同步將下月的預期順序寫入下月的歷史紀錄中
																																				            const nextMonthDate = new Date(year, month, 1);
																																				            const nextMonthKey = `${nextMonthDate.getFullYear()}-${String(nextMonthDate.getMonth() + 1).padStart(2, "0")}`;
																																				            dutySeqHistory[nextMonthKey] = [...nextDutySeq];

																																		            const daysInMonth = getDaysInMonth(year, month);
																																		            const dutyEmployees = employees.filter(e => e.name !== "王宏榮");
																																		            
																																		            const currentSelectorName = getCurrentSelectorName(year, month, assigned);
																																		            let selectorHtml = "";
																																		            if (currentSelectorName) {
																																				              selectorHtml = `
																																						                <div style="margin-top: 8px; font-weight: 700; color: #f59e0b; background: #fffbeb; border: 1px solid #fef3c7; padding: 6px 10px; border-radius: 6px; font-size: 13px;">
																																						                  🔔 當前輪到：<strong style="color: #d97706; font-size: 14px;">${currentSelectorName}</strong> 選班與補休
																																						                </div>
																																						              `;
																																				            } else {
																																						              selectorHtml = `
																																						                <div style="margin-top: 8px; font-weight: 700; color: #10b981; background: #ecfdf5; border: 1px solid #d1fae5; padding: 6px 10px; border-radius: 6px; font-size: 13px;">
																																						                  🎉 本月選班與補休已全部完成！
																																						                </div>
																																						              `;
																																						            }

																																		            let html = `
              <div class="duty-stats-title">
                <span>📅 選班順序與天數統計</span>
                <div style="display: flex; gap: 6px;">
                  <button id="shuffleSeqBtn" class="toggle-button" style="padding: 4px 8px; font-size: 11px;">隨機重整</button>
                  <button id="resetDutySelectionsBtn" class="toggle-button" style="padding: 4px 8px; font-size: 11px;">重設選班</button>
                </div>
              </div>
              <div class="duty-stats-summary" style="margin-bottom: 8px;">
                <strong>本月應值班總天數：${total} 天</strong> (週六 ${saturdays} 天 + 國定假日 ${holidays} 天)<br>
                <span style="font-size: 11px; color: #94a3b8;">* 假日「休」改為「空格」表示上班；平日可選「補」補休</span>
              </div>
              ${selectorHtml}
              
              <div style="margin-top: 16px; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #475569; display: flex; justify-content: space-between; align-items: center;">
                <span>📊 每人選班進度 (可拖曳調整順序)</span>
              </div>
              <div class="duty-stats-list">
																																				            `;
																																		            currentDutySeq.forEach(name => {
																																				              const emp = employees.find(e => e.name === name);
																																				              const { duty: selDuty, comp: selComp } = getEmployeeSelections(emp.id, year, month);
																																				              const req = assigned[name] || 0;
																																				              
																																				              let dutyPct = req > 0 ? (selDuty / req) * 100 : 0;
																																				              if (dutyPct > 100) dutyPct = 100;
																																				              let compPct = req > 0 ? (selComp / req) * 100 : 0;
																																				              if (compPct > 100) compPct = 100;

																																				              const isCurrent = (name === currentSelectorName);
																																				              const isCompleted = (selDuty === req && selComp === req);
																																				              
																																				              let badgeHtml = "";
																																				              if (isCompleted) {
																																						                badgeHtml = `<span style="background: #ecfdf5; color: #10b981; border: 1px solid #a7f3d0; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 700;">已完成</span>`;
																																						              } else if (isCurrent) {
																																								                badgeHtml = `<span style="background: #fffbeb; color: #d97706; border: 1px solid #fde68a; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; animation: pulse 1.5s infinite;">選班中</span>`;
																																								              } else {
																																										                badgeHtml = `<span style="background: #f1f5f9; color: #94a3b8; border: 1px solid #cbd5e1; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 700;">等待中</span>`;
																																										              }

																																				              html += `
																																						                <div class="duty-member-item" draggable="true" data-name="${name}" style="padding: 10px; border-radius: 8px; border: 1px solid ${isCurrent ? '#fde68a' : '#e2e8f0'}; background: ${isCurrent ? '#fffbeb' : '#ffffff'};">
						                  <div class="duty-member-info" style="margin-bottom: 6px;">
						                    <span style="font-weight: 700; color: ${isCurrent ? '#b45309' : '#334155'};">${currentDutySeq.indexOf(name) + 1}. ${name} ${badgeHtml}</span>
																																						                    <span style="font-size: 12px; color: #64748b;">應值 ${req} 天</span>
																																						                  </div>
																																						                  
																																						                  <div style="display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #475569; margin-bottom: 2px;">
																																						                    <span>📅 假日值班：</span>
																																						                    <span style="font-weight: 700;">${selDuty} / ${req} 天</span>
																																						                  </div>
																																						                  <div class="duty-progress-bar" style="margin-bottom: 8px; height: 6px;">
																																						                    <div class="duty-progress-fill ${selDuty === req ? 'completed' : 'normal'}" style="width: ${dutyPct}%;"></div>
																																						                  </div>
																																						                  
																																						                  <div style="display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #475569; margin-bottom: 2px;">
																																						                    <span>🏖️ 平日補休：</span>
																																						                    <span style="font-weight: 700;">${selComp} / ${req} 天</span>
																																						                  </div>
																																						                  <div class="duty-progress-bar" style="height: 6px;">
																																						                    <div class="duty-progress-fill ${selComp === req ? 'completed' : 'normal'}" style="width: ${compPct}%;"></div>
																																						                  </div>
																																						                </div>
																																						              `;
																																				            });
																																		            html += `
																																				              </div>
																																				              <div class="duty-seq-flow" style="background: #f8fafc; border: 1px dashed #cbd5e1;">
																																				                <div class="duty-seq-title" style="display: flex; justify-content: space-between; align-items: center;">
																																				                  <span>⏭️ 下月預期順序</span>
																																				                  <button id="applyNextSeqBtn" class="toggle-button" style="padding: 2px 6px; font-size: 10px; height: auto;">套用為本月</button>
																																				                </div>
																																				                <div class="duty-seq-badge-container">
																																				                  ${nextDutySeq.map((name, idx) => `<span class="duty-seq-badge" style="background: #f1f5f9;">${idx + 1}. ${name}</span>`).join('<span class="duty-seq-arrow">→</span>')}
																																				                </div>
																																				              </div>
																																				            `;
																																		            card.innerHTML = html;

			            // 綁定拖曳排序事件
			            let draggedName = null;
			            const items = card.querySelectorAll(".duty-member-item");
			            items.forEach(item => {
			              item.addEventListener("dragstart", (e) => {
			                draggedName = item.getAttribute("data-name");
			                item.style.opacity = "0.5";
			                e.dataTransfer.effectAllowed = "move";
			                e.dataTransfer.setData("text/plain", draggedName);
			              });
			              
			              item.addEventListener("dragend", () => {
			                item.style.opacity = "1";
			                draggedName = null;
			                items.forEach(i => i.classList.remove("drag-over"));
			              });
			              
			              item.addEventListener("dragover", (e) => {
			                e.preventDefault();
			                if (draggedName && draggedName !== item.getAttribute("data-name")) {
			                  item.classList.add("drag-over");
			                }
			              });
			              
			              item.addEventListener("dragleave", () => {
			                item.classList.remove("drag-over");
			              });
			              
			              item.addEventListener("drop", (e) => {
			                e.preventDefault();
			                item.classList.remove("drag-over");
			                const name = e.dataTransfer.getData("text/plain");
			                const targetName = item.getAttribute("data-name");
			                
			                if (name && name !== targetName) {
			                  const fromIdx = currentDutySeq.indexOf(name);
			                  const toIdx = currentDutySeq.indexOf(targetName);
			                  if (fromIdx > -1 && toIdx > -1) {
			                    currentDutySeq.splice(fromIdx, 1);
			                    currentDutySeq.splice(toIdx, 0, name);
			                    
			                    const monthKey = `${Number(yearInput.value)}-${String(Number(monthInput.value)).padStart(2, "0")}`;
			                    dutySeqHistory[monthKey] = [...currentDutySeq];
			                    
			                    updateScheduleTitle();
			                  }
			                }
			              });
			            });



																																		            document.getElementById("applyNextSeqBtn").addEventListener("click", () => {
																																				              currentDutySeq = [...nextDutySeq];
																																				              const monthKey = `${Number(yearInput.value)}-${String(Number(monthInput.value)).padStart(2, "0")}`;
																																				              dutySeqHistory[monthKey] = [...currentDutySeq];
																																				              updateScheduleTitle();
																																				            });

																																		            document.getElementById("resetDutySelectionsBtn").addEventListener("click", () => {
																																				              dutyEmployees.forEach(emp => {
																																						                for (let day = 1; day <= daysInMonth; day++) {
																																								                  const dateKey = formatDateKey(year, month, day);
																																								                  const selKey = `${emp.id}-${dateKey}`;
																																								                  delete userDutySelections[selKey];
																																								                }
																																						              });
																																				              updateScheduleTitle();
																																				            });

																																		            document.getElementById("shuffleSeqBtn").addEventListener("click", () => {
																																				              currentDutySeq.sort(() => Math.random() - 0.5);
																																				              const monthKey = `${Number(yearInput.value)}-${String(Number(monthInput.value)).padStart(2, "0")}`;
																																				              dutySeqHistory[monthKey] = [...currentDutySeq];
																																				              updateScheduleTitle();
																																				            });
																																		          }

																												      function applyInitialValuesFromUrl() {
																														            const params = new URLSearchParams(window.location.search);
																														            const yearParam = params.get("year");
																														            const monthParam = params.get("month");

																														            const today = new Date();
																														            const currentYear = today.getFullYear();
																														            const currentMonth = today.getMonth() + 1;

																														            if (yearParam !== null) {
																																            yearInput.value = yearParam;
																																          } else {
																																		            yearInput.value = currentYear;
																																		          }

																														            if (monthParam !== null) {
																																            monthInput.value = monthParam;
																																          } else {
																																		            monthInput.value = currentMonth;
																																		          }

																														            updateScheduleTitle();
																														          }

																												      yearInput.addEventListener("input", updateScheduleTitle);
																												      monthInput.addEventListener("input", updateScheduleTitle);
																												      holidayToggle.addEventListener("change", updateScheduleTitle);
																												      originalHolidayToggle.addEventListener("change", updateScheduleTitle);
																												      selectDutyButton.addEventListener("click", () => {
																														            selectDutyModeEnabled = !selectDutyModeEnabled;
																														            selectDutyButton.classList.toggle("active", selectDutyModeEnabled);
																														            document.body.classList.toggle("select-duty-mode-active", selectDutyModeEnabled);
